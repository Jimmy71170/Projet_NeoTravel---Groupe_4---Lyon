services:
  n8n:
    image: n8nio/n8n:latest
    container_name: neotravel-n8n

    restart: unless-stopped

    ports:
      - "5678:5678"

    environment:
      - TZ=Europe/Paris
      - N8N_SECURE_COOKIE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/

    volumes:
      - ./data:/home/node/.n8n